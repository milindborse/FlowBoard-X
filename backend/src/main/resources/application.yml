server:
  port: 8080

spring:
  application:
    name: flowboard-x

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowboardx}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

flowboardx:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-it-must-be-at-least-256-bits-long}
    expiration-ms: 86400000
  execution:
    queue-key: flowboardx:execution:queue
    worker-pool-size: 4
    max-retry-attempts: 5
    base-backoff-ms: 1000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.flowboardx: DEBUG
    org.springframework.web.socket: INFO